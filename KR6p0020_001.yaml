body:
  text: 第一卷雲棲寺宋咸淳臨安志寺名雲棲出寺觀類第十五葉在錢塘五雲山後詳具雲棲記治平二年改名棲真寺今曰雲棲復其舊也知所先後大學聖經章物有本末事有終始知所先後則近道矣注本始所先末終所後守約施博孟子曰言近而指遠者善言也守約而施博者善道也注守約是修身施博是天下平與知與能中庸君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉即本智而求佛智華嚴玄談云真妄交徹即凡心而見佛心理事雙修即本智而求佛智本智者即衆生本有之智佛智者即究竟果佛之智畫虎不就東漢光武時伏波將軍馬援征蠻遺書誡子曰效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也反落一籌籌算也張良云請借前箸籌之是也又古人飲博以籌記罰楊纂怒尹君不同己判欲更之執筆沈吟久之曰纂輸一籌嫂溺援之以手淳于髠曰男女授受不親禮與孟子曰禮也嫂溺則援之以手乎曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手者權也倚門而望王孫賈齊湣王臣淖齒弒湣王王孫賈未有討賊意歸寧其母母曰汝朝出而晚歸則吾倚門而望汝暮出而不還則吾倚閭而望汝今事王王出走汝不知其處何面目立天下乎賈於是興國人攻淖齒君子恥其言而過其行出論語事必師古傅說對商高宗事不師古以克永世匪說攸聞父曰吾怙母曰吾恃詩經無父何怙無母何恃怙覆冒之意恃倚賴之意劬勞之德昊天罔極詩經哀哀父母生我劬勞欲報之德昊天罔極螟蛉異姓詩經螟蛉有子蜾裸負之教誨爾子式穀似之懷慕終身孟子曰人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者豫於大舜見之矣左右無方禮記檀弓篇事親有隱而無犯左右就養無方定省不違禮記曲禮上篇凡為人子者冬溫而夏凊昏定而晨省既竭心思孟子曰堯舜之道不以仁政不能平治天下又曰既竭心思焉繼之以不忍人之政而仁覆天下矣心之官則思心之官則思思則得之不思則不得也出孟子官猶司也職掌之謂得得其理也精誠之極鬼神與通管子曰思之思之又重思之思之不得鬼神其將通之非鬼神通之精誠之極也孺子封侯漢高帝初起時魏無知薦陳平才可用以為護軍中尉及得天下封功臣陳平封曲逆侯平曰臣非魏無知何繇得進願讓封帝曰陳平可謂不背本矣乃更官魏無知陳平微時為里社分肉甚均社老稱孺子善宰平曰使平宰天下亦如是肉矣孺子遂以此知名用蠡測海恃管窺天東方朔答客難曰以管窺天以蠡測海以梃撞鐘豈能通其條貫考其淺深發其音聲哉蟻山風水蓮宗寶鑑云餘門學道如蟻子上於高山念佛往生似風帆揚於順水田蛙井鮒莊子曰田蛙不可語於海者拘於𭏟也易經井卦九二爻井谷射鮒曝腮華嚴玄談云上德聲聞杜視聽於嘉會積行菩薩曝腮鱗於龍門言積行菩薩不能入華嚴大道如禹門三級魚躍不過者曝腮而還永嘉擬之螢光證道歌云有二比丘犯淫殺波離螢光增罪結維摩大士頓除疑猶如赫日消霜雪不淨錯施爐韝數息不利冢人舍利弗教二弟子修不淨觀及數息觀久之無益心欲反道往見佛佛問在家業何行修數息者曰守墳冢修不淨者曰治金器佛令二人易觀修之不久皆證道果三心圓發觀經上品上生章一者至誠心二者深心三者回向發願心乾曰大生坤曰廣生繫辭云夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉寶鏡遁妖隋王度得寶鏡為縣令縣中有大樹樹有神令至者必祭否則為祟度令人夜懸寶鏡於樹其夜大雷雨則晨視之樹粉碎有大蛇死樹下又遇逆旅見其家有女殊色主人云數月前有客攜至此云續當來取迄今杳然度心疑其非人潛出鏡女即惶駭請死曰我乃狐也惑人多矣今死於君手乞藏鏡即當受死度曰藏鏡汝得無遁乎妖曰神物所燭何處隱形願得一醉而死與之酒大醉而寢就視之老狐死於牀上其餘種種靈異不可盡述七年之病孟子曰今之欲王者猶七年之病求三年之艾也如牛壞車如牛以牽車為苦便壞其車主人復造如人厭身為苦速滅其身不知此身雖滅復受餘身生身尊特猶待辨疑有言六十萬億那由他之身乃是生身蓋淨土之身勝於穢土穢土生身丈六淨土生身宜爾許高大也知禮法師以十三重問答辨此決是尊特身也出妙宗鈔菩薩六念念佛念法念僧念天念戒念施念佛者慈悲導師念法者三世佛母念僧者人天福田念天者長壽安樂念戒者清淨身心念施者普濟貧窮十心向往一於衆生起大慈無損害心二於衆生起大悲無逼惱心三於佛法不惜身命樂守護心四於一切法發生勝忍無執著心五不貪利養敬重淨意樂心六求佛種智於一切時無忘失心七於衆生尊重恭敬無下劣心八不著世論於菩提分生決定心九種諸善根無有雜染清淨之心十於諸佛捨離諸相起隨念心諸天共器食有精粗淨名經云譬如諸天共寶器食隨其福德食色有異三獸同河渡分深淺永嘉集云譬夫象馬兔渡河足有短長而分深淺十門推本一音聲語言二名句文身三通取四法四諸法顯義五攝境唯心六會緣入空七理事無礙八通攝所詮九事事無礙十海印炳現香飯作佛事淨名經云衆香國中香積如來以香飯而作佛事尊者無說我乃無聞空生晏坐石室中空中帝釋天散華供養空生曰散華者誰曰我天帝釋也何以散華曰以尊者善說般若尊者曰我本無說帝釋曰尊者無說我乃無聞無說無聞乃真說般若也宗有十門一我法俱有二法有我無三法無去來四通現假實五俗妄真實六諸法但名七三性空有八真空絶相九空有無礙十圓融具德支婁讖等五譯人支婁讖後漢時人光武中興故名後漢明帝光武子也康僧愷魏人曹丕繼漢國號魏支謙三國孫吳時人宋法賢趙宋時人元魏菩提流志南北朝魏人拓跋氏改姓元國號魏周有嬴秦南北朝有苻秦姚秦周時有非子者伯益之後善養馬周平王愛之封於陝國號秦是為嬴秦嬴其姓也苻秦東晉時氐種也苻堅強盛據關中國亦號秦是為苻秦姚秦羌種也姚萇為苻堅將後堅為晉所敗萇遂據關中傳子興是為姚秦周禮掌四方之語東方曰寄南方曰象西方曰狄鞮北方曰譯皆官名寄言能寄寓風俗之異於此象言能倣象風俗之異於彼鞮則欲別其服飾之異譯則欲辨其語言之異周官通謂之象胥而世俗通謂之譯也又譯釋也猶言謄也謂以彼此言語相謄釋而通之也遣將呂光秦苻堅建元十三年使呂光伐龜茲破之擁衆歸至涼州因據州稱涼王光死姪呂隆降晉乃迎什師入關居逍遙園孤山十疏流通文殊般若經佛遺教經般若心經瑞應經四十二章經不思議法門經無量義經普賢觀經阿彌陀經首楞嚴經世稱十經疏主其麗不億詩云商之孫子其麗不億寶王論草堂飛錫法師作念佛三昧寶王論龍舒等龍舒居士王日休作淨土文無盡居士張商英有求生淨土文侍郎王古直作淨土決疑集吳郡沙門大佑作淨土指歸集無功居士王闐作淨土自信録慈雲懺主遵式作淨土略傳徑路修行善導和尚偈漸漸雞皮鶴髮看看行步龍鍾云云惟有徑路修行但念阿彌陀佛神棲安養永明壽禪師作神棲安養賦諸家懷淨土詩宋中峰本禪師元西齊楚石琦禪師等枝低只為罣金臺我師一念登初地佛國笙歌兩度來惟有門前云云空谷毒峰天奇皇明空谷隆禪師有空谷集毒峰善禪師有語録天奇瑞禪師號㷀絶老人有㷀絶集羣星悉皆拱北論語云為政以德譬如北辰居其所而衆星拱之圓照標名蓮境宋宗本常州無錫人初參天衣懷禪師念佛有省後遷淨慈雷峰材法師神遊淨土見一華殊麗問之曰待淨慈本禪師又資福曦公至慧林禮足施金而去人詰其故曰吾定中見金蓮華人言以俟禪師蓋師雖在宗門兼修淨土後臨終坐逝諡圓照僧睿蓮華出榻僧睿從羅什法師稟受經義後預廬山蓮社宋元嘉十六年忽告衆曰吾將行矣面西合掌而化衆見睿榻前一金蓮華倐爾而隱五色香煙從其房出文潞公蘇長公文彥博為宋宰相封潞公蘇軾為翰林學士與弟轍俱有盛名故號長公岐黃岐伯與軒轅黃帝問答作內經等書為醫家祖清照說偈西歸宋慧亨住武安稱清照律師延壽初依靈芝習律專修淨業六十年臨終集衆念佛為說偈曰彌陀口口誦白毫念念想持此不退心決定生安養捨仙學而回心淨業宋葛濟之句容人世事仙學妻紀氏獨精誠念佛元嘉三年方在機杼忽覺空中清明因投杼仰瞻四表見西方有佛現身寶蓋幢幡映蔽雲漢喜曰經言無量壽佛其即此耶面佛作禮濟之驚異就之紀氏指示佛所濟之亦見半身俄而隱沒祥雲五彩親里咸覩焉自是歸佛法矣焚仙經而專修觀經後魏曇鸞性嗜長生受陶隱君仙經十卷後遇菩提流支乃問曰佛有長生不死術乎支笑曰長生不死吾佛道也乃授十六觀經學此則三界無復生六道無復往其為壽也河沙劫石莫能比焉此吾金仙氏之長生也曇大喜遂焚仙經而修淨業冥君敬禮永明壽禪師入滅後有僧自臨安來經年繞師塔人問故曰我病入冥見殿左供一僧像王勤致禮敬密詢其人則曰此杭州永明壽禪師也凡死者皆經冥府此師已徑生西方上上品矣王以其德故敬禮也羅剎休心有羅剎在一聚落其民人日送子與食有子歸信三寶一心念佛遂不能食得歸擬議易云擬之而後言議之而後動擬議以成其變化卜以決疑不疑何卜唐太宗為秦王時與太子建成相忌欲舉兵衆議恐不勝命卜之張公謹取龜投地曰卜以決疑不疑何卜第二卷天台六即一理即佛一切衆生皆有佛性二名字即佛知識經卷聞名知字三觀行即佛依教修行即五品位四相似即佛相似解發十信位五分證即佛分證分破初住至等覺位六究竟即佛智斷圓滿妙覺位華嚴明十身佛一正覺佛二願佛三業報佛四住持佛五涅槃佛六法界佛七心佛八三昧佛九本性佛十隨樂佛當暗中有明當明中有暗南嶽石頭和尚參同契曰當明中有暗勿以暗相遇當暗中有明勿以明相覩明暗各相對比如前後步讀古齊桓公讀書於堂上輪扁斫輪於堂下釋椎鑿而上曰君之所讀者何書公曰古人之書曰古人存乎公曰往矣曰然則君之所讀者古人之糟粕也公曰寡人讀書輪人安得議乎有說則生無說則死曰請以臣之業觀之斫輪徐則甘而不固疾則苦而不入不疾不徐得之心而應之手有數存焉臣不能喻臣之子臣之子不能得之於臣是以行年七十而老斫輪夫古之人其不可傳者已往矣然則公之所讀者其古人之糟粕也已瑜伽四義瑜伽第六云略繇四義故稱我聞一為世間語便易故二為隨順世間故三為斷除定無我怖畏故四為宣說自他得失令生決定信解心故弘廣菩薩之所流通涅槃經第四十卷佛告文殊師利阿難比丘是吾之弟給事我來二十餘年所可聞法具足受持喻如瀉水置之一器是故我今顧問阿難為在何所欲令受持是涅槃經善男子我涅槃後阿難比丘所未聞者弘廣菩薩當能流布阿難求三願一不受佛故衣二不隨佛受別請三二十年法請重說周正建子夏正建寅今之正月初昏時斗柄指寅十二月指丑十一月指子夏時取人生於寅故以建寅為歲首商取地闢於丑故建丑為歲首周取天開於子故建子為歲首而建寅為正三三昧有覺有觀三昧無覺有觀三昧無覺無觀三昧百八三昧首楞嚴三昧寶印三昧師子遊戲三昧妙月三昧月幢相三昧乃至離著虗空無染三昧孔恩周急論語孔子云君子周急不繼富岐政先㷀孟子舉文王治岐之政曰老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者文王發政施仁必先斯四者詩曰哿矣富人哀此㷀獨四邪命食一方口食曲媚權勢通使四方二維口食種種呪術卜算吉凶三仰口食仰觀星宿以自活命四下口食種植田園和合湯藥千里面談唐太宗為秦王時在軍中使房玄齡入奏事於高祖高祖笑曰玄齡為吾兒奏事雖隔千里猶如面談久在泗濵相依陳蔡山東泗水之濵有杏壇是孔子興弟子談道處孔子將適楚道過陳蔡陳蔡大夫發徒圍之此時十哲皆從顏淵閔子騫冉伯牛仲弓宰我子貢冉有季路子游子夏十六大國五天竺國如舍衛王舍等顏閔無文游夏缺行顏閔即顏淵閔子騫列在德行之科游夏即子游子夏在文學科目連化身降龍難陀跋難陀兄弟居須彌邊海佛嘗飛空上忉利宮是龍瞋恨云何禿人從我上過後時佛欲上天是龍吐黑雲暗霧隱翳三光諸比丘咸欲降之佛不聽目連云我能降是龍佛即許之其龍以身繞須彌七匝尾拖海水頭枕山頂目連倍現其身繞山十四匝尾拖海外頭枕梵宮是龍瞋盛雨金剛砂目連變砂為寶華輕軟可愛猶瞋不已目連化為細身入龍身內從眼入耳出從耳入鼻出龍受苦痛其心乃服外道移山制之不動外道師徒五百用呪移山經一月日簸峨已動目連念言此山若移多所損害即於山頂結跏山還不動外道相謂我法山動計日必移云何安固還若於初必是沙門使爾自知力弱歸心佛法一城釋種舉之梵天琉璃大王滅釋種目連欲救佛以定業難逃不允其請目連以神力將鉢盛五百釋種托至梵天琉璃王滅釋之後舉鉢視之唯血水而已故知業力佛亦不能救也止車燒堂耆域善知方藥生忉利天目連因弟子病乘通往問值諸天出游耆域乘車不下但合掌而已目連以神力駐之耆域云諸天受樂匆匆不暇相看尊者欲何所求目連具說來意答云斷食為要目連放之車乃得前帝釋與修羅戰勝造得勝堂樓臺七寶莊嚴奇特梁柱支節皆容一綖不相著而能相持天福之力能如此目連飛往帝釋將之看堂諸天女皆羞目連悉隱避不出目連念帝釋著樂不修道本即以神通燒得勝堂赫然崩壞仍為帝釋廣說無常帝釋歡喜後堂儼然無灰煙色子繫母故尊者幼喪父母欲改適因子繫故不遂其心猶繩繫扇故曰扇繩馬麥之報佛與弟子三月在毗蘭邑食馬麥以償宿報獨憍梵於天上受供尸利沙國大國名塔猶却貝阿育王禮諸羅漢塔次至薄拘羅塔而說偈言雖自練無明於世少利益因供二十貝子而貝子從塔飛出來著王足諸臣驚怪以生平閒靜少欲其塔猶有是力又外國用貝如此土用錢人以貝供尊者塔前貝即落地以示不受不假璣衡璿璣玉衡也注璿美珠也璣機也以璿飾璣所以象天之體轉運也衡橫也謂衡簫也以玉為管橫而設之所以窺璣而齊七政之運行猶今之渾天儀也比之螺蛤阿㝹樓䭾聽法之次多昏睡佛責云咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字難兄難弟東漢太丘長陳實生二子曰元方季方俱有俊才二子之子各論父功德詣祖決其優劣實曰元方難為兄季方難為弟文殊十瑞一光明滿室二甘露盈庭三地涌七珍四神開伏藏五雞生鳳子六豬娩龍豚七馬産麒麟八牛生白澤九倉變金粟十象生六牙詳有五名一云尊重一名威猛一云降伏一云一云龍蛇混雜凡聖交參無著禪師禮五臺遇文殊化老翁問云南方佛法如何住持著云末法僧尼少持戒律無著云此間佛法如何住持翁云龍蛇混雜凡聖交參命在呼吸四十二章經云佛問沙門人命在幾間答言數日間曰子未知道又問人命在幾間曰飯食間佛言子未知道又問人命在幾間答云人命在呼吸間佛言子知道矣十種權實淨土華嚴合論第一阿彌陀經淨土第二觀無量壽佛經淨土此二是權未實第三維摩經淨土是實未廣第四梵網經淨土是實未廣第五摩醯首羅天淨土第六涅槃經淨土此二是權未實第七法華經三變淨土亦是權未實第八靈山會所指淨土是實非權第九唯心淨土是實淨土第十毗盧所居淨土是實淨土楞嚴深呵楞嚴破想陰文云都指見在即為佛國無別淨居及金色相多岐亡羊列子載楊子之鄰人亡羊既率其黨又請楊子之豎子共追之楊子曰一羊何追者之衆曰多岐路已而返竟不得羊曰岐路之中又有岐焉不知所之故也故曰大道以多岐亡羊學者以多方喪生專注中鵠鵠皮革中之的也射候用皮其中畫鵠以為的見卵而求時夜莊子曰且汝亦太早計見卵而求時夜見彈而求梟炙時夜雞也見卵而即望其報曉甚言欲之極也體露金風僧問雲門樹雕葉落時如何門云體露金風瑜伽一百一十苦詳具論中二十四樂三十益詳具彼鈔彼論聖解還成魔境楞嚴經云不作聖心名善境界若作聖解即受羣邪佛見早墮鐵圍經云佛言文殊昨夜起佛見法見被吾貶向二鐵圍山牛羊絶牧孟子曰牛山之木非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也謂牧養牛羊而戕其芽也過迦旃鄰陀迦旃鄰陀者天竺柔軟草名也觸之者能生樂受庭前柏樹僧問趙州如何是祖師西來意州云庭前柏樹子檻外藥欄僧問雲門如何是清淨法身門云花藥欄八種清風世間八風謂條風明庶風清明風景風涼風閶闔風不周風廣莫風然彼土無四時或應八方或對八卦或自有八種不必強為之說堯處茆茨唐堯為天子時宮室儉素茆茨不翦謂以茆茨草蓋屋而不翦齊其簷極言其朴陋也箕諫象玉箕子紂之叔父紂作象箸箕子歎曰彼為象箸必為玉杯則遠方珍怪之物至矣遂入諫紂不聽囚之舜在𤱶畝孟子曰舜發於𤱶畝之中書曰帝耕於歷山警蹕冕旒天子出陳警入陳蹕天子儀仗也冕冠也天子十有二旒有天下不與論語云巍巍乎舜禹之有天下也而不與焉注不與猶言不相關言其不以位為樂也誦斯偈者尚致口出青蓮華香昔有女尼日誦法華經青蓮華香白蓮華香二句後世因感口有蓮華香之報營修世福為有漏因達摩初見梁武帝帝問寡人造寺寫經度僧無數有功德否祖云實無功德帝曰何以無功德師曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真實功德答曰淨智妙玄體自空寂如是功德不以世求第三卷塤鳴箎奏塤土篪竹二器互相唱和詩云伯氏吹塤仲氏吹箎玉振金聲孟子曰集大成也者金聲而玉振之也注金鐘也聲宣也八音未作則先擊鎛鐘以宣其聲玉磬也振收也俟其既闋後擊特磬以收其韻哀矣不傷樂而不泆二號論語子曰關睢樂而不淫哀而不傷注云淫者樂之過而失其正者也傷者哀之過而害於和者也泆即淫也羽寂宮沈宮商角徵羽號為五音當平心地則世界平持地菩薩於普光佛時為比丘平填道路至毗舍如來時國大王延佛設齊爾時菩薩平地待佛佛摩頂云當平心地則世界平心有高下丘陵坑坎維摩經云舍利弗言我見此土丘陵坑坎荊棘沙礫土石諸山穢惡充滿螺髻梵王言仁者心有高下不依佛慧故見此土為不淨耳於是佛以足指按地即時大千世界珍寶嚴飾夜氣清明孟子曰其日夜之所息平旦之氣其好惡與人相近也者幾希謂一日之間汩沒於物欲其氣昏濁平旦之時其氣清明所好惡與人相近不至大背於人情也三種意生身一三昧樂正受意生身屬聲聞二覺法自性性意生身屬菩薩三種類俱生無行作意生身屬佛四種三昧一常行三昧般舟九十日為期專念彼佛亦云佛立三昧二常坐三昧文殊問般若九十日為期專緣法界理不兼餘事亦云一行三昧三半行半坐三昧方等法華等懺限期不定或三七日七日十日等上三實相理觀四非行非坐三昧諸經行法不專行坐並屬此攝即隨自意三昧此一唯事觀釋迦調達宿因釋迦佛與調達往昔為共命鳥一為調達者睡一為釋迦佛者醒醒者因取香果而食香氣芬然睡者覺而惡曰何瞞我而食也吾當以毒果害之遂食毒果二命俱喪由之瑟子曰由之瑟奚為於丘之門注言其聲之不和與己不同也鄭之聲孔子曰放鄭聲遠人鄭聲淫人殆黃鍾大呂樂有十二律黃鍾太簇姑洗蕤賓夷則無射為陽六律大呂夾鍾仲呂林鍾南呂應鍾為陰六律二十二根信進念定慧憂喜苦樂捨眼耳鼻舌身意共十六根男根女根未知欲知根已知根命根具知根五邪命一為利養詐現異相二為利養自說功德三占相吉凶為人說法四高聲現威令人畏敬五說得供養以動人心扞格禮記學篇扞格而不勝注扞拒扞也格讀如凍𠗂之𠗂謂如地之凍堅強而難入也一暴十寒孟子曰雖有天下易生之物也一日暴之十日寒之未有能生者也六律交唱陽六陰六同前八音克諧此書經舜典后夔之語八音克諧無相奪倫神人以和八音者金石絲竹匏土革木諧和也三法忍音響忍柔順忍無生忍忉利天鼓華嚴經云忉利諸天著五欲樂行放逸時天鼓之中自然出音告彼天子此樂無常莫行放逸等雷音寶林雷音例忉利寶林例天鼓虗空及性功德虗空功德者往生論頌云無量寶交絡羅網虗空中種種鈴發響宣吐妙法音性功德者頌云正道大慈悲出生善根故猶是王老師兒孫黃蘗到南泉一日齊時捧鉢向南泉位上坐南泉下來見便問長老什麼年中行道師云威音那畔泉云猶是王老兒孫三轉四諦一示相轉此是苦逼迫性此是集招感性此是滅可證性此是道可修性二勸修轉此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修三作證轉此是苦我已知此是集我已斷此是滅我已證此是道我已修洛閎一行洛閎漢武帝時人精於歷數漢時改正朔其所定也算周天數云後幾百年當有差訛必有聖人出而正之唐玄宗時僧一行果出復定歷數九章一方田二粟布三差分四少廣五商均六均輸七當程八盈肭九勾股置子莊嶽孟子謂戴不勝曰有楚大夫於此欲其子之齊語也則使齊人傳諸使楚人傳諸曰使齊人傳之曰一齊人傳之衆楚人咻之雖日撻而求其齊也不可得矣引而置之莊嶽之間數年雖日撻求其楚亦不可得矣莊嶽齊街里名願受天樂昔有貧女處於糞聚以人民所棄殘餘滓汁為食迦葉從乞以汁供養尊者問其所願云欲生天數日命終生忉利天福勝餘天願作冥王毗沙國王與維陀始王共戰兵力不如因立誓言願我來世為地獄主治此罪人十八大臣亦復如是今地獄主毗沙國王是十八獄主十八大臣是若合符節孟子論舜與文王得志行於中國若合符節注云符節以玉為之篆刻文字而中分之彼此各藏其半有故則左右相合為信也若合符節言其同也登龍與瀛東漢李膺尚氣節孤高峻白少所交與人被其容接者以為登龍門焉唐太宗開弘文館以杜如晦虞世南褚遂良等十八人為學士人羡其榮以為瀛洲之選大士求登蓮録長蘆賾禪師建蓮華勝會普勸念佛一夕夢一人烏巾白衣風貌清美揖而曰願入蓮華勝會乞書一名賾問何名答曰普慧書已又云家兄普賢亦乞併書賾覺而簡華嚴離世間品有二菩薩名遂為會首云卜居猶擇里仁論語子曰里仁為美擇不處仁焉得知矛盾矛鑹也即槍戈之屬盾干也排也昔人雙賣二事各歎其勝歎盾云矛刺不入歎矛即云能穿十重之盾智者語云我買汝矛還刺汝盾入與不入即無辭矣哲老青公哲老者住京師大剎四十年不睡坐禪精苦如此坐化後紙襖亦燒出舍利以不修西方後生大富貴處青公者即青草堂年九十餘有曾家婦人常為齊供及布施衣物和尚感其恩乃言老僧與夫人作兒子一日婦人果生子及詢草堂已坐化矣後官至宰相皎然覆轍漢賈誼曰前車覆轍後車戒直觀三道顯本性佛三道惑業苦也觀惑即般若業即解脫苦即法身三德圓融是本性也祀祖七廟禮記云天子七廟三昭三穆與太祖之廟共為七教民七年論語云善人教民七年亦可以即戎矣淨名八法一饒益衆生而不望報二代一切衆生受諸苦惱所作功德盡以施之三等心衆生謙下無礙於諸菩薩視之如佛四所未聞經聞之不疑五不與聲聞而相違背六不嫉彼供不高己利而於其中調伏其心七常省己過不訟彼短八恆以一心求諸功德成就八法於此世界行無瘡尤生於淨土華嚴十念藏一寂靜念二清淨念三不竭念四明徹念五離塵念六離種種塵念七離垢念八光耀念九可愛樂念十無障礙念德雲二十一種念佛門一智光普照二令一切衆生三令安住力四令安住法五照耀諸方六入不可見處七住於諸劫八住一切時九住一切剎十住一切世十一住一切境十二住寂滅十三住遠離十四住廣大十五住微細十六住莊嚴十七住能事十八住自在心十九住自業二十住神變二十一住虗空傳法四句偈達摩初祖付二祖神光偈云吾本來茲土傳法度迷情一華開五葉結果自然成印心四卷經祖對二祖曰吾有楞伽四卷亦用付汝即是如來心要法門令諸衆生開示悟入仁道難熟他道有成孟子曰五穀者種之美者也苟為不熟不如荑稗夫仁亦在乎熟之而已矣第四卷時時示時人時人自不識古云彌勒真彌勒化身千百億時時示時人時人自不識指掌語云其如視諸斯乎指其掌言易曉也堯仁舜孝禹儉湯寬堯仁者鑑云堯仁如天舜孝者舜父頑母嚚象傲克諧以孝禹儉者菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宮室而盡力乎溝洫湯寬者伊尹贊湯曰代虐以寬割雞焉用牛刀語云子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀注曰武城邑名言此小邑何必用此大道也溪聲盡是廣長舌蘇東坡詩云溪聲盡是廣長舌山色無非清淨身佛有八音一極好二柔軟三和適四尊慧五不女六不誤七深遠八不竭吳其沼乎此伍子胥語言越十年生聚十年教訓二十年後吳其沼乎左傳五種怖一不活二惡名三死怖四惡道五威德四無畏一一切智無畏二漏盡無畏三決疑無畏四說苦盡無畏文殊取鉢仰之彌高顏淵歎夫子之道曰仰之彌高鑽之彌堅瞻之在前忽焉在後易地則皆然禹稷當平世三過其門而不入孔子賢之顏子當亂世居於陋巷一簞食一瓢飲人不堪其憂顏子不改其樂孔子賢之孟子曰禹稷顏回同道又曰禹稷顏子易地則皆然盡信書則不如無書孟子曰盡信書則不如無書吾於武城取二三策而已仁人無敵於天下以至仁伐至不仁而何其血之流杵也火車相現觀經下品中生文中或有衆生犯五戒八戒及具足戒如此愚人偷僧祇物不淨說法無有慚愧以諸惡業而自莊嚴如此罪人以惡業故應墮地獄命欲終時地獄衆火一時俱至遇善知識讚說阿彌陀佛此人聞已除罪往生等靈山上德終成敗北之愆靈山會上五千退席及華嚴會上不見舍那之輩亦是其流敗北者軍戰敗曰北漢地金剛始有滅南之想德山號周金剛不信南宗單傳直指之說作青龍鈔徑往南方欲滅南宗路遇婆子買點心婆子問云所擔者何物曰金剛經青龍鈔曰金剛經云三心不可得尊者欲點何心山無對後至龍潭往復扣擊晃然大悟乃曰窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑乃焚青龍鈔云妙首白槌世尊一日升座文殊白槌云諦觀法王法法王法如是世尊便下座天童頌云一段真風見也麼綿綿化母理機梭織成古錦含春象無奈東君漏泄何雙林撫尺梁武帝請傅大士講金剛經大士座上揮案一下便下座帝愕然志公問陛下還會麼帝云不會志公云大士講經竟仙陀婆仙陀婆梵語具鹽水馬器四名惟有智臣乃能辨識如王食時呼仙陀婆即知要鹽如王洗盥索仙陀婆即知要水如王作衆務時呼仙陀婆即知要器如王出遊索仙陀婆即知要馬覓心了不可得初祖住止少林二祖晨夕參承時當隆冬大雪光堅立不動遲明積雪過膝後潛取利刀自斷左臂曰我心未安乞師與我安心師曰將心來與汝安曰覓心了不可得曰與汝安心竟
